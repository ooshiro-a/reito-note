<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rec's 冷凍ノート v3.5 + Sheets連携</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5}
.app{padding:0.75rem 0;max-width:700px;margin:0 auto;background:#fff}
.tabs{display:flex;gap:0;border-bottom:1px solid #ddd;margin-bottom:1.25rem;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab{padding:12px 16px;font-size:13px;cursor:pointer;border:none;background:transparent;color:#666;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;min-height:44px;display:flex;align-items:center;font-weight:500}
.tab.active{color:#333;border-bottom:2px solid #333;font-weight:600}
.section-title{font-size:10px;font-weight:700;color:#999;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px;margin-top:8px;padding:0 1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;padding:0 1rem}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;padding:0 1rem}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:11px;color:#666;font-weight:600}
.field input,.field select{height:44px;padding:0 12px;border:1px solid #ddd;border-radius:10px;background:#fff;color:#333;font-size:15px}
.field input:focus,.field select:focus{outline:none;border-color:#333;box-shadow:0 0 0 2px rgba(0,0,0,0.05)}
.unit{font-size:9px;color:#999;margin-top:2px}
.btn-primary{width:calc(100% - 2rem);height:50px;background:#333;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;margin:12px 1rem;letter-spacing:0.02em}
.btn-primary:active{opacity:0.75}
.scale-card{border:1px solid #ddd;border-radius:14px;padding:1.2rem;margin:0 1rem 12px;background:#fff}
.scale-title{font-size:14px;font-weight:600;margin-bottom:16px;color:#333}
.scale-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.scale-btn{padding:8px 16px;border-radius:20px;border:1px solid #ddd;background:#fff;color:#666;font-size:12px;cursor:pointer;font-weight:500;min-height:36px;transition:all 0.2s}
.scale-btn:hover{border-color:#333}
.scale-btn.active{background:#333;color:#fff;border-color:#333}
.gauge-wrapper{display:flex;flex-direction:column;align-items:center;margin:24px 0;padding:20px;background:linear-gradient(135deg,#f9f9f9 0%,#fff 100%);border-radius:16px;border:1px solid #eee}
.gauge-container{position:relative;width:320px;height:200px}
.gauge-svg{width:100%;height:100%;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.08))}
.gauge-info{display:flex;justify-content:space-around;align-items:center;margin-top:16px;padding:12px;background:#f9f9f9;border-radius:10px;width:100%;gap:12px}
.gauge-stat{text-align:center;flex:1}
.gauge-label{font-size:10px;font-weight:600;color:#999}
.gauge-value-display{font-size:20px;font-weight:700;color:#333;font-family:monospace;letter-spacing:0.05em;margin-top:4px}
.scale-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;padding:0 1rem;margin-top:12px}
.scale-item{background:#f9f9f9;border-radius:10px;padding:10px 8px;text-align:center;border:1px solid #e8e8e8}
.scale-item.evap{background:#cce5ff;border:1px solid #0066ff}
.scale-item.cond{background:#ffcccc;border:1px solid #ff0000}
.scale-temp{font-size:10px;font-weight:600;margin-bottom:4px}
.scale-temp.evap{color:#003d99}
.scale-temp.cond{color:#990000}
.scale-press{font-size:18px;font-weight:700;color:#333;margin:4px 0}
.scale-unit{font-size:9px;color:#999}
.conv-row{display:flex;gap:8px;align-items:flex-end;margin:16px 1rem 12px;flex-wrap:wrap}
.conv-input{flex:1;min-width:120px}
.conv-result{background:#f9f9f9;border:1px solid #eee;border-radius:10px;padding:10px 12px;font-size:12px;color:#666;min-width:180px;text-align:center}
.conv-result strong{color:#333;font-size:14px;display:block;margin-bottom:2px}
.records-list{padding:0 1rem}
.record-card{border:1px solid #ddd;border-radius:12px;padding:12px;margin-bottom:10px;background:#fafafa}
.record-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.record-site{font-size:14px;font-weight:600;color:#333}
.record-date{font-size:10px;color:#999}
.record-meta{font-size:11px;color:#666;margin-bottom:8px}
.record-data{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:11px;margin-bottom:10px}
.record-item{background:#fff;border-radius:8px;padding:8px;border:1px solid #e8e8e8}
.record-label{color:#999;font-weight:500;margin-bottom:2px}
.record-value{font-size:13px;font-weight:600;color:#333}
.record-actions{display:flex;gap:6px;margin-top:10px}
.btn-small{flex:1;background:#333;color:#fff;border:none;border-radius:6px;padding:8px;font-size:12px;cursor:pointer;font-weight:500;min-height:36px;transition:all 0.2s}
.btn-small:hover{background:#555}
.btn-small:active{opacity:0.8}
.btn-delete{background:#ff6b6b;color:#fff}
.btn-delete:hover{background:#ff5252}
.btn-send{background:#0066ff;color:#fff}
.btn-send:hover{background:#0052cc}
.btn-send.sending{opacity:0.6;pointer-events:none}
.empty-state{text-align:center;padding:40px 20px;color:#999}
.status-badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin-left:8px}
.status-sent{background:#e8f5e9;color:#2e7d32}
.status-pending{background:#fff3e0;color:#e65100}
.status-error{background:#ffebee;color:#c62828}
.toast{position:fixed;bottom:20px;left:20px;right:20px;max-width:300px;padding:12px;border-radius:8px;font-size:12px;color:#fff;z-index:999;animation:slideUp 0.3s ease}
.toast.success{background:#4caf50}
.toast.error{background:#f44336}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>
<div class="app">
<div class="tabs">
  <button class="tab active" onclick="showTab('input')">📋 データ入力</button>
  <button class="tab" onclick="showTab('records')">🗂 記録一覧</button>
  <button class="tab" onclick="showTab('scale')">🌡 冷媒スケール</button>
</div>

<div id="tab-input">
  <div class="section-title">基本情報</div>
  <div class="grid2">
    <div class="field"><label>現場名</label><input id="site" placeholder="例：山田食堂"/></div>
    <div class="field"><label>機種名</label><input id="model" placeholder="例：IM-45M-1"/></div>
  </div>
  
  <div class="grid3">
    <div class="field">
      <label>機器種別</label>
      <select id="type">
        <option value="ice">製氷機</option>
        <option value="cooler">冷蔵庫</option>
        <option value="freezer">冷凍庫</option>
        <option value="ac">エアコン</option>
        <option value="other">その他</option>
      </select>
    </div>
    <div class="field">
      <label>外気温</label>
      <input id="amb" type="number" step="0.1" placeholder="32.0"/>
      <div class="unit">℃</div>
    </div>
    <div class="field">
      <label>庫内温度</label>
      <input id="indoor" type="number" step="0.1" placeholder="-5.0"/>
      <div class="unit">℃</div>
    </div>
  </div>

  <div class="section-title">冷媒種別</div>
  <div class="grid2">
    <div class="field">
      <label>冷媒</label>
      <select id="refrigerant">
        <option value="R404A">R404A（低温冷凍・製氷）</option>
        <option value="R410A">R410A（空調・エアコン）</option>
        <option value="R22">R22（旧冷媒）</option>
        <option value="R134a">R134a（中温冷蔵）</option>
        <option value="R407C">R407C（空調・R22代替）</option>
        <option value="R32">R32（新冷媒・低GWP）</option>
        <option value="R600a">R600a（自然冷媒）</option>
      </select>
    </div>
    <div class="field">
      <label>冷媒特性</label>
      <div id="ref-info" style="font-size:11px;color:#666;padding:8px;background:#f9f9f9;border-radius:8px;line-height:1.5">R404A：低温冷凍・製氷機に多用</div>
    </div>
  </div>

  <div class="section-title">冷凍サイクルデータ</div>
  <div class="grid2">
    <div class="field">
      <label>吐出圧力（高圧）</label>
      <input id="hp" type="number" step="0.01" placeholder="1.85"/>
      <div class="unit">MPa</div>
    </div>
    <div class="field">
      <label>吸入圧力（低圧）</label>
      <input id="lp" type="number" step="0.01" placeholder="0.30"/>
      <div class="unit">MPa</div>
    </div>
  </div>

  <div class="grid2">
    <div class="field">
      <label>吐出温度</label>
      <input id="td" type="number" step="0.1" placeholder="80.0"/>
      <div class="unit">℃</div>
    </div>
    <div class="field">
      <label>吸入温度</label>
      <input id="ts" type="number" step="0.1" placeholder="5.0"/>
      <div class="unit">℃</div>
    </div>
  </div>

  <div class="grid2">
    <div class="field">
      <label>運転電流</label>
      <input id="amp" type="number" step="0.1" placeholder="3.5"/>
      <div class="unit">A</div>
    </div>
    <div class="field">
      <label>メモ</label>
      <input id="note" placeholder="気になる点など"/>
    </div>
  </div>

  <button class="btn-primary" onclick="saveRecord()">診断して記録 →</button>
</div>

<div id="tab-records" style="display:none">
  <div class="records-list" id="records-list"></div>
</div>

<div id="tab-scale" style="display:none">
  <div class="scale-card">
    <div class="scale-title">🌡 冷媒スケール（飽和圧力・温度対応）</div>
    <div class="scale-selector" id="scale-btns"></div>
    
    <div class="section-title" style="padding:0;margin-top:0">圧力ゲージ</div>
    <div class="gauge-wrapper">
      <div class="gauge-container">
        <svg id="gauge-svg" class="gauge-svg" viewBox="0 0 320 220" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <filter id="shadowFilter">
              <feGaussianBlur in="SourceGraphic" stdDeviation="0.5"/>
            </filter>
          </defs>
          <g id="gauge-base">
            <path d="M 40 180 A 120 120 0 0 1 280 180" fill="none" stroke="#e8e8e8" stroke-width="10" stroke-linecap="round"/>
            <path id="gauge-arc-low" d="M 40 180 A 120 120 0 0 1 160 60" fill="none" stroke="#0066ff" stroke-width="10" stroke-linecap="round" opacity="0.25"/>
            <path id="gauge-arc-high" d="M 160 60 A 120 120 0 0 1 280 180" fill="none" stroke="#ff0000" stroke-width="10" stroke-linecap="round" opacity="0.25"/>
          </g>
          <g id="gauge-ticks"></g>
          <g id="gauge-labels"></g>
          <line x1="160" y1="180" x2="160" y2="30" stroke="#333" stroke-width="3" id="gauge-needle" stroke-linecap="round" filter="url(#shadowFilter)"/>
          <circle cx="160" cy="180" r="6" fill="#333" filter="url(#shadowFilter)"/>
          <text x="160" y="210" text-anchor="middle" font-size="13" font-weight="600" fill="#666">MPa</text>
        </svg>
      </div>
      <div class="gauge-info">
        <div class="gauge-stat">
          <div class="gauge-label">現在の圧力</div>
          <div class="gauge-value-display" id="gauge-display-value">—</div>
        </div>
        <div class="gauge-stat">
          <div class="gauge-label">圧力入力</div>
          <div class="gauge-value-display" id="gauge-input-value">—</div>
        </div>
      </div>
    </div>
    
    <div class="section-title" style="padding:0">圧力 → 飽和温度 換算</div>
    <div class="conv-row">
      <div class="conv-input field">
        <label>圧力を入力</label>
        <input id="conv-press" type="number" step="0.01" placeholder="0.63"/>
        <div class="unit">MPa</div>
      </div>
      <div class="conv-result" id="conv-result">
        <strong>—</strong>
        圧力を入力すると<br>飽和温度を表示
      </div>
    </div>
    
    <div class="section-title" style="padding:0;margin-top:16px">飽和温度 → 圧力 一覧</div>
    <div class="scale-grid" id="scale-grid"></div>
  </div>
</div>
</div>

<div id="toast"></div>

const GAS_URL="https://script.google.com/macros/s/AKfycbxVEJdinfi6ggdzIhefF72YrU6etjoi5WtrpZdRUV6XbI9DaWEzDlvkIBd5u9YfMBe0KA/exec";
let records=[];const STORAGE_KEY='recs_records_v3';

document.getElementById('refrigerant').addEventListener('change',()=>{const ref=REFRIGERANTS[document.getElementById('refrigerant').value];if(ref)document.getElementById('ref-info').textContent=ref.info;});

function showToast(message,type='success'){const toast=document.getElementById('toast');toast.textContent=message;toast.className=`toast ${type}`;setTimeout(()=>{toast.className=''},3000);}

function loadRecords(){try{const data=localStorage.getItem(STORAGE_KEY);if(data)records=JSON.parse(data);}catch(e){}}

function saveRecords(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(records));}catch(e){}}

function deleteRecord(id){records=records.filter(r=>r.id!==id);saveRecords();renderRecords();}

function sendToSheets(id){const record=records.find(r=>r.id===id);if(!record){showToast('記録が見つかりません','error');return;}const btn=event.target;btn.classList.add('sending');btn.disabled=true;btn.textContent='送信中...';fetch(GAS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(record)}).then(r=>r.json()).then(data=>{if(data.success){record.sent=true;saveRecords();renderRecords();showToast('スプレッドシートに送信しました','success');}else{showToast('送信エラー: '+data.error,'error');}}).catch(e=>{console.error(e);showToast('送信に失敗しました','error');}).finally(()=>{btn.classList.remove('sending');btn.disabled=false;btn.textContent='📤 送信'});}

function typeLabel(t){return{ice:'製氷機',cooler:'冷蔵庫',freezer:'冷凍庫',ac:'エアコン',other:'その他'}[t]||t;}

function renderRecords(){const el=document.getElementById('records-list');if(records.length===0){el.innerHTML='<div class="empty-state">記録がありません<br>データ入力タブから診断を開始しましょう</div>';return;}el.innerHTML=records.map(r=>{const isSent=r.sent?'<span class="status-badge status-sent">送信済</span>':'<span class="status-badge status-pending">未送信</span>';return`<div class="record-card"><div class="record-header"><div><div class="record-site">${r.site}${isSent}</div><div class="record-meta">${typeLabel(r.type)} / ${r.model}</div></div><div style="text-align:right"><div class="record-date">${r.date}</div></div></div><div class="record-data"><div class="record-item"><div class="record-label">高圧</div><div class="record-value">${r.hp} MPa</div></div><div class="record-item"><div class="record-label">低圧</div><div class="record-value">${r.lp} MPa</div></div><div class="record-item"><div class="record-label">吐出温度</div><div class="record-value">${r.td}℃</div></div><div class="record-item"><div class="record-label">吸入温度</div><div class="record-value">${r.ts}℃</div></div></div><div class="record-actions"><button class="btn-small btn-send" onclick="sendToSheets(${r.id})">📤 送信</button><button class="btn-small btn-delete" onclick="deleteRecord(${r.id})">削除</button></div></div>`;}).join('');}

function saveRecord(){const site=document.getElementById('site').value.trim();const model=document.getElementById('model').value.trim();if(!site||!model){alert('現場名と機種名を入力してください');return;}const record={id:Date.now(),date:new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}),site,model,type:document.getElementById('type').value,refrigerant:document.getElementById('refrigerant').value,hp:parseFloat(document.getElementById('hp').value)||0,lp:parseFloat(document.getElementById('lp').value)||0,td:parseFloat(document.getElementById('td').value)||0,ts:parseFloat(document.getElementById('ts').value)||0,amb:parseFloat(document.getElementById('amb').value)||0,indoor:parseFloat(document.getElementById('indoor').value)||0,amp:parseFloat(document.getElementById('amp').value)||0,note:document.getElementById('note').value.trim(),sent:false};records.unshift(record);saveRecords();document.getElementById('site').value='';document.getElementById('model').value='';document.getElementById('type').value='ice';document.getElementById('refrigerant').value='R404A';document.getElementById('hp').value='';document.getElementById('lp').value='';document.getElementById('td').value='';document.getElementById('ts').value='';document.getElementById('amb').value='';document.getElementById('indoor').value='';document.getElementById('amp').value='';document.getElementById('note').value='';showToast('記録を保存しました','success');showTab('records');}

let currentScaleRef='R404A';function drawGauge(){const svg=document.getElementById('gauge-svg');const labelsGroup=svg.querySelector('#gauge-labels');const ticksGroup=svg.querySelector('#gauge-ticks');labelsGroup.innerHTML='';ticksGroup.innerHTML='';for(let i=0;i<=20;i++){const press=i*0.1;const angle_frac=i/20;const rad=Math.PI+angle_frac*Math.PI;const x=160+130*Math.cos(rad);const y=180+130*Math.sin(rad);const text=document.createElementNS('http://www.w3.org/2000/svg','text');text.setAttribute('x',x);text.setAttribute('y',y+5);text.setAttribute('text-anchor','middle');text.setAttribute('font-size','12');text.setAttribute('font-weight','600');text.setAttribute('fill',press<1?'#0066cc':'#cc0000');text.textContent=press.toFixed(1);labelsGroup.appendChild(text);const tx1=160+115*Math.cos(rad);const ty1=180+115*Math.sin(rad);const tx2=160+132*Math.cos(rad);const ty2=180+132*Math.sin(rad);const line=document.createElementNS('http://www.w3.org/2000/svg','line');line.setAttribute('x1',tx1);line.setAttribute('y1',ty1);line.setAttribute('x2',tx2);line.setAttribute('y2',ty2);line.setAttribute('stroke',press<1?'#0066cc':'#cc0000');line.setAttribute('stroke-width','2');line.setAttribute('opacity','0.6');ticksGroup.appendChild(line);}}function updateGauge(){const convPress=parseFloat(document.getElementById('conv-press').value);if(!isNaN(convPress)&&convPress>0&&convPress<=2){const angle_frac=convPress/2;const rad=Math.PI+angle_frac*Math.PI;const needle=document.getElementById('gauge-needle');needle.setAttribute('x2',160+110*Math.cos(rad));needle.setAttribute('y2',180+110*Math.sin(rad));needle.setAttribute('stroke',convPress<1?'#0066cc':'#cc0000');document.getElementById('gauge-display-value').textContent=convPress.toFixed(2);document.getElementById('gauge-input-value').textContent=convPress.toFixed(2);}else{document.getElementById('gauge-needle').setAttribute('x2',160);document.getElementById('gauge-needle').setAttribute('y2',30);document.getElementById('gauge-needle').setAttribute('stroke','#999');document.getElementById('gauge-display-value').textContent='—';document.getElementById('gauge-input-value').textContent='—';}}function pressToTemp(refKey,press){const ref=REFRIGERANTS[refKey];if(!ref)return null;const evapKeys=Object.keys(ref.evap).map(Number).sort((a,b)=>a-b);const condKeys=Object.keys(ref.cond).map(Number).sort((a,b)=>a-b);let evapInterp=null;for(let i=0;i<evapKeys.length-1;i++){const t1=evapKeys[i],t2=evapKeys[i+1];const p1=ref.evap[String(t1)],p2=ref.evap[String(t2)];if(press>=Math.min(p1,p2)&&press<=Math.max(p1,p2)){const t=t1+(press-p1)/(p2-p1)*(t2-t1);evapInterp=t.toFixed(1);break;}}let condInterp=null;for(let i=0;i<condKeys.length-1;i++){const t1=condKeys[i],t2=condKeys[i+1];const p1=ref.cond[String(t1)],p2=ref.cond[String(t2)];if(press>=Math.min(p1,p2)&&press<=Math.max(p1,p2)){const t=t1+(press-p1)/(p2-p1)*(t2-t1);condInterp=t.toFixed(1);break;}}return{evapInterp,condInterp};}function renderScaleBtns(){const el=document.getElementById('scale-btns');el.innerHTML=Object.keys(REFRIGERANTS).map(k=>`<button class="scale-btn${k===currentScaleRef?' active':''}" onclick="selectScale('${k}')">${k}</button>`).join('');}function selectScale(refKey){currentScaleRef=refKey;renderScaleBtns();renderScaleGrid();convertPress();}function renderScaleGrid(){const ref=REFRIGERANTS[currentScaleRef];if(!ref)return;const el=document.getElementById('scale-grid');const evapRows=Object.entries(ref.evap).sort((a,b)=>Number(a[0])-Number(b[0]));const condRows=Object.entries(ref.cond).sort((a,b)=>Number(a[0])-Number(b[0]));let html=`<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:#003d99;padding:8px 0">▼ 蒸発側（低圧）</div>`;html+=evapRows.map(([t,p])=>`<div class="scale-item evap"><div class="scale-temp evap">${t}℃</div><div class="scale-press">${p.toFixed(3)}</div><div class="scale-unit">MPa</div></div>`).join('');html+=`<div style="grid-column:1/-1;font-size:10px;font-weight:700;color:#990000;padding:8px 0 0">▲ 凝縮側（高圧）</div>`;html+=condRows.map(([t,p])=>`<div class="scale-item cond"><div class="scale-temp cond">${t}℃</div><div class="scale-press">${p.toFixed(3)}</div><div class="scale-unit">MPa</div></div>`).join('');el.innerHTML=html;}function convertPress(){const press=parseFloat(document.getElementById('conv-press').value);const el=document.getElementById('conv-result');updateGauge();if(isNaN(press)||press<=0){el.innerHTML='<strong>—</strong>圧力を入力すると<br>飽和温度を表示';return;}const r=pressToTemp(currentScaleRef,press);if(!r){el.innerHTML='<strong>—</strong>';return;}let html='';if(r.evapInterp!==null)html+=`<strong>蒸発: ${r.evapInterp}℃</strong><br>`;if(r.condInterp!==null)html+=`<strong>凝縮: ${r.condInterp}℃</strong>`;el.innerHTML=html;}function showTab(name){document.getElementById('tab-input').style.display=name==='input'?'':'none';document.getElementById('tab-records').style.display=name==='records'?'':'none';document.getElementById('tab-scale').style.display=name==='scale'?'':'none';const tabs=['input','records','scale'];document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',tabs[i]===name);});if(name==='records'){renderRecords();}if(name==='scale'){renderScaleBtns();renderScaleGrid();drawGauge();}}window.addEventListener('load',()=>{loadRecords();renderRecords();renderScaleBtns();renderScaleGrid();drawGauge();});
</script>
</body>
</html>
